{% extends 'shared/layout.html' %}

{% block title %}
	بازیابی کلمه عبور
{% endblock %}


{% block content %}
    <div class="container">
		<section id="form"><!--form-->
			<div class="row">

				<div class="col-sm-6 col-md-offset-3">
					<div class="signup-form"><!--sign up form-->
						<h2>بازیابی کلمه عبور </h2>
						<form  method="post" action="{% url 'forget-password' %}">
                            {% csrf_token %}

                            {{forgot_pass.email.label_tag }}
                            {{forgot_pass.email}}
                            {{forgot_pass.email.errors }}
                            
                            <p><a href="{% url 'login_page' %}"> ورود  </a></p>

                            <button type="submit" class="btn btn-default">ارسال ایمیل</button>
                        </form>
					</div><!--/sign up form-->
				</div>
			</div>
		</section>
	</div>


{% endblock %}
